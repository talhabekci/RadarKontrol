<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="Türkiye genelinde rota üzerindeki radar noktalarını ve hız koridorlarını gerçek zamanlı görüntüleyin.">
  <title>RadarKontrol – Yolculuk Öncesi Radar Haritası</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Update notification banner -->
  <div id="update-banner" class="update-banner hidden">
    <span class="update-icon">🔄</span>
    <span id="update-text">Yeni radar verisi mevcut!</span>
    <button id="update-refresh-btn" class="update-refresh-btn">Haritayı Güncelle</button>
    <button id="update-dismiss-btn" class="update-dismiss-btn" aria-label="Kapat">✕</button>
  </div>

  <div class="app-container">

    <!-- ===== SIDEBAR PANEL ===== -->
    <aside class="sidebar" id="sidebar">

      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">📡</span>
          <span class="logo-text">Radar<strong>Kontrol</strong></span>
        </div>
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Paneli kapat/aç">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
      </div>

      <div class="sidebar-body" id="sidebar-body">

        <!-- Route Form -->
        <div class="route-form">
          <h1 class="form-title">Rota Oluştur</h1>
          <p class="form-subtitle">Başlangıç ve varış noktanızı seçin</p>

          <!-- FROM -->
          <div class="form-section">
            <div class="form-section-label">
              <span class="point-dot from-dot"></span>
              <span>Nereden</span>
            </div>
            <div class="select-group">
              <div class="select-wrapper">
                <label for="from-city" class="sr-only">Başlangıç İli</label>
                <select id="from-city" class="select-input" disabled>
                  <option value="">İl Seçin</option>
                </select>
                <span class="select-arrow">▾</span>
              </div>
              <div class="select-wrapper">
                <label for="from-district" class="sr-only">Başlangıç İlçesi</label>
                <select id="from-district" class="select-input" disabled>
                  <option value="">İlçe Seçin</option>
                </select>
                <span class="select-arrow">▾</span>
              </div>
            </div>
          </div>

          <!-- Swap button -->
          <div class="swap-row">
            <div class="route-line"></div>
            <button class="swap-btn" id="swap-btn" title="Rotayı ters çevir" aria-label="Rotayı ters çevir">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
              </svg>
            </button>
            <div class="route-line"></div>
          </div>

          <!-- TO -->
          <div class="form-section">
            <div class="form-section-label">
              <span class="point-dot to-dot"></span>
              <span>Nereye</span>
            </div>
            <div class="select-group">
              <div class="select-wrapper">
                <label for="to-city" class="sr-only">Varış İli</label>
                <select id="to-city" class="select-input" disabled>
                  <option value="">İl Seçin</option>
                </select>
                <span class="select-arrow">▾</span>
              </div>
              <div class="select-wrapper">
                <label for="to-district" class="sr-only">Varış İlçesi</label>
                <select id="to-district" class="select-input" disabled>
                  <option value="">İlçe Seçin</option>
                </select>
                <span class="select-arrow">▾</span>
              </div>
            </div>
          </div>

          <!-- Submit -->
          <button class="route-btn" id="route-btn" disabled>
            <span class="btn-label">Rotayı Göster</span>
            <span class="btn-spinner hidden" aria-hidden="true"></span>
          </button>
        </div>

        <!-- Stats Panel (shown after route) -->
        <div class="stats-panel hidden" id="stats-panel">
          <div class="stats-header">
            <span class="stats-route-name" id="stats-route-name">—</span>
          </div>
          <div class="stats-grid">
            <div class="stat-card radar-card">
              <div class="stat-icon">📷</div>
              <div class="stat-value" id="stat-radars">0</div>
              <div class="stat-label">Radar</div>
            </div>
            <div class="stat-card checkpoint-card">
              <div class="stat-icon">🚔</div>
              <div class="stat-value" id="stat-checkpoints">0</div>
              <div class="stat-label">Kontrol Noktası</div>
            </div>
            <div class="stat-card corridor-card">
              <div class="stat-icon">⚡</div>
              <div class="stat-value" id="stat-corridors">0</div>
              <div class="stat-label">Hız Koridoru</div>
            </div>
          </div>

          <!-- City breakdown -->
          <div class="city-list" id="city-list"></div>

          <!-- Update info -->
          <div class="update-info">
            <span class="update-dot"></span>
            <span id="last-updated">Son güncelleme: —</span>
          </div>
        </div>

        <!-- Legend -->
        <div class="legend">
          <div class="legend-title">Harita Göstergeleri</div>
          <div class="legend-items">
            <div class="legend-item">
              <div class="legend-line blue-line"></div>
              <span>Rota</span>
            </div>
            <div class="legend-item">
              <div class="legend-line red-line"></div>
              <span>Hız Koridoru</span>
            </div>
            <div class="legend-item">
              <div class="legend-icon radar-legend-icon"></div>
              <span>Radar / Kontrol Noktası</span>
            </div>
          </div>
        </div>

      </div><!-- /sidebar-body -->
    </aside>

    <!-- ===== MAP ===== -->
    <main class="map-container">
      <div id="map"></div>

      <!-- Mobile toggle -->
      <button class="mobile-panel-btn" id="mobile-panel-btn" aria-label="Formu göster/gizle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
        <span>Rota Seç</span>
      </button>

      <!-- Map loading overlay -->
      <div class="map-loading hidden" id="map-loading">
        <div class="map-loading-inner">
          <div class="pulse-ring"></div>
          <div class="pulse-ring pulse-ring-2"></div>
          <div class="pulse-ring pulse-ring-3"></div>
          <div class="loading-icon">📡</div>
        </div>
        <p>Rota hesaplanıyor…</p>
      </div>
    </main>

  </div><!-- /app-container -->

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <script src="app.js"></script>
</body>
</html>
